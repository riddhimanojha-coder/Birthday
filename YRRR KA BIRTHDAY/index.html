<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Jyotika 🎂</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Music -->

    <audio id="music" loop>
        <source src="birthday-song.mp3" type="audio/mp3">
    </audio>

    <button class="music-btn" onclick="playMusic()">
        🎵 Play Music
    </button>

    <!-- Gifts -->

    <div class="gift gift1">🎁</div>
    <div class="gift gift2">🎀</div>
    <div class="gift gift3">🧸</div>
    <div class="gift gift4">🎉</div>

    <!-- Main Card -->

    <div class="container">

        <h1>🎂 Happy Birthday Jyotika 🎂</h1>

        <!-- Slideshow -->

        <div class="slideshow">

            <img src="photo1.png"
            class="slide active">

            <img src="photo2.png"
            class="slide">

            <img src="photo3.png"
            class="slide">

        </div>

        <p>
            Wishing you happiness,
            smiles and beautiful memories ✨
        </p>

        <!-- Cake -->

        <div class="cake"
        id="cake">

            🎂

        </div>

        <button onclick="cutCake()">
            Cut Cake 🍰
        </button>

        <!-- Letter -->

        <div class="letter">

            <h2>💌 Letter For Jyotika</h2>

            <p>

                Dear Jyotika,<br><br>

                Happy Birthday 🎂✨<br><br>

                I hope your day is filled
                with happiness, laughter
                and beautiful memories ❤️<br><br>

                Stay happy always 🌸

            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
